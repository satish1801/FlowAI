nclick=\"{{ r.onClick }}\" title=\"{{ r.title }}\" style=\"{{ r.style }}\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"><\u002Frect><path d=\"M9 11V7a3 3 0 0 1 6 0v4\"><\u002Fpath><circle cx=\"9\" cy=\"15.5\" r=\"1\"><\u002Fcircle><circle cx=\"15\" cy=\"15.5\" r=\"1\"><\u002Fcircle><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"width:262px;flex:none;background:#111922;border:1px solid #1C2530;border-radius:16px;padding:16px;display:flex;flex-direction:column\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:14px\">\n              <span style=\"width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#5901E2,#9B8CFF);display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l1.9 4.6L18.5 9.5l-4.6 1.9L12 16l-1.9-4.6L5.5 9.5l4.6-1.9L12 3z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n              <div><div style=\"font-size:13.5px;font-weight:800\">AI Advisor<\u002Fdiv><div style=\"font-size:9.5px;color:#9B8CFF;font-weight:700;letter-spacing:.5px;text-transform:uppercase\">Live route insights<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px;overflow-y:auto\">\n              <sc-for list=\"{{ routeAdvisor }}\" as=\"a\" hint-placeholder-count=\"3\">\n                <div style=\"background:#0E141B;border:1px solid #1C2530;border-radius:11px;padding:12px 13px\">\n                  <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:7px\">\n                    <span style=\"width:7px;height:7px;border-radius:50%;background:{{ a.sevColor }}\"><\u002Fspan>\n                    <span style=\"font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:{{ a.sevColor }}\">{{ a.sev }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"font-size:12.5px;font-weight:700;margin-bottom:5px;line-height:1.35\">{{ a.title }}<\u002Fdiv>\n                  <div style=\"font-size:11px;color:#8A98A8;line-height:1.55\">{{ a.body }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-top:14px\">\n            <sc-for list=\"{{ routeRoster }}\" as=\"r\" hint-placeholder-count=\"3\">\n              <div style=\"flex:1;min-width:230px;background:#111922;border:1px solid #1C2530;border-radius:13px;padding:13px 15px\">\n                <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px\">\n                  <span style=\"width:11px;height:11px;border-radius:50%;background:{{ r.color }}\"><\u002Fspan>\n                  <span style=\"font-size:13px;font-weight:700;font-family:'IBM Plex Mono',monospace\">{{ r.id }}<\u002Fspan>\n                  <span style=\"margin-left:auto;font-size:9.5px;font-weight:800;letter-spacing:.5px;color:{{ r.statusColor }}\">{{ r.status }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"font-size:11.5px;color:#8A98A8;margin-bottom:11px;min-height:17px;line-height:1.5\">{{ r.routeText }}<\u002Fdiv>\n                <button onclick=\"{{ r.onDefine }}\" style=\"width:100%;padding:8px;background:#0E141B;border:1px solid #233040;border-radius:8px;color:#C3D0DD;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit\">Define route<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ routeModalOpen }}\" hint-placeholder-val=\"false\">\n        <div onclick=\"{{ closeRoute }}\" style=\"position:fixed;inset:0;background:rgba(6,10,14,.74);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px\">\n          <div onclick=\"{{ stopProp }}\" style=\"width:560px;max-width:94vw;max-height:88vh;overflow-y:auto;background:#111922;border:1px solid #26323F;border-radius:18px;box-shadow:0 30px 90px rgba(0,0,0,.6)\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid #1C2530\">\n              <div>\n                <div style=\"font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:#9B8CFF;font-weight:700;margin-bottom:3px\">Define robot route<\u002Fdiv>\n                <div style=\"font-size:17px;font-weight:800;font-family:'IBM Plex Mono',monospace\">{{ routeModalName }}<\u002Fdiv>\n              <\u002Fdiv>\n              <button onclick=\"{{ closeRoute }}\" style=\"width:32px;height:32px;border-radius:9px;background:#0E141B;border:1px solid #233040;color:#8A98A8;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;font-family:inherit\">✕<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"padding:18px 20px\">\n              <div style=\"font-size:11px;color:#5E6E80;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px\">Path sequence<\u002Fdiv>\n              <sc-if value=\"{{ routeDraftEmpty }}\" hint-placeholder-val=\"true\">\n                <div style=\"padding:14px;border:1.5px dashed #2A3542;border-radius:11px;font-size:12.5px;color:#8A98A8;text-align:center;margin-bottom:18px\">No waypoints yet — add points below. Order is the travel order: A → B → C.<\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-if value=\"{{ routeDraftNotEmpty }}\" hint-placeholder-val=\"false\">\n                <div style=\"display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:18px\">\n                  <sc-for list=\"{{ routeDraftItems }}\" as=\"d\" hint-placeholder-count=\"3\">\n                    <span style=\"display:flex;align-items:center;gap:7px;padding:6px 9px 6px 8px;background:#0E141B;border:1px solid #2A3542;border-radius:9px;font-size:12px;color:#C3D0DD\">\n                      <span style=\"width:18px;height:18px;border-radius:50%;background:#5901E2;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex:none\">{{ d.seq }}<\u002Fspan>\n                      {{ d.label }}\n                      <button onclick=\"{{ d.onRemove }}\" style=\"background:none;border:none;color:#8A98A8;cursor:pointer;font-size:12px;padding:0 0 0 2px;font-family:inherit\">✕<\u002Fbutton>\n                    <\u002Fspan>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n              <sc-for list=\"{{ routePickGroups }}\" as=\"g\" hint-placeholder-count=\"4\">\n                <div style=\"margin-bottom:13px\">\n                  <div style=\"font-size:11px;color:#8A98A8;font-weight:600;margin-bottom:7px\">{{ g.title }}<\u002Fdiv>\n                  <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n                    <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n                      <button onclick=\"{{ it.onClick }}\" style=\"display:flex;align-items:center;gap:6px;padding:7px 11px;background:#0E141B;border:1px solid #233040;border-radius:8px;color:#C3D0DD;font-size:11.5px;font-weight:600;cursor:pointer;font-family:inherit\">\n                        <span style=\"width:8px;height:8px;border-radius:2px;background:{{ it.color }}\"><\u002Fspan>{{ it.label }}\n                      <\u002Fbutton>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 20px;border-top:1px solid #1C2530\">\n              <button onclick=\"{{ draftClear }}\" style=\"padding:9px 14px;background:transparent;border:1px solid #233040;border-radius:9px;color:#8A98A8;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit\">Clear<\u002Fbutton>\n              <div style=\"display:flex;gap:9px\">\n                <button onclick=\"{{ closeRoute }}\" style=\"padding:9px 16px;background:transparent;border:1px solid #233040;border-radius:9px;color:#C3D0DD;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit\">Cancel<\u002Fbutton>\n                <button onclick=\"{{ saveRoute }}\" style=\"{{ routeSaveStyle }}\">Save route &amp; run<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <\u002Fsc-if>\n\n        <!-- BESPOKE: SKU Slotting Optimiser (Data Fabric) -->\n        <sc-if value=\"{{ capDetail.isSlotting }}\" hint-placeholder-val=\"\">\n        <div>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:18px\">\n            <label for=\"fa-slot-file\" style=\"display:flex;align-items:center;gap:8px;padding:9px 15px;border-radius:9px;background:#5901E2;color:#fff;font-size:12.5px;font-weight:700;cursor:pointer\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M17 8l-5-5-5 5\"><\u002Fpath><path d=\"M12 3v12\"><\u002Fpath><\u002Fsvg>Upload SKU master\n              <input id=\"fa-slot-file\" type=\"file\" accept=\".csv,.xlsx,.xls\" onchange=\"{{ onSlotUpload }}\" style=\"display:none\">\n            <\u002Flabel>\n            <button onclick=\"{{ runSlotModel }}\" style=\"display:flex;align-items:center;gap:8px;padding:9px 15px;border-radius:9px;background:transparent;border:1px solid #5901E2;color:#B79CFF;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l1.9 4.6L18.5 9.5l-4.6 1.9L12 16l-1.9-4.6L5.5 9.5l4.6-1.9L12 3z\"><\u002Fpath><\u002Fsvg>Run AI model\n            <\u002Fbutton>\n            <span style=\"font-size:11.5px;color:#5E6E80\">Velocity simulated per demand window across 50,086 ASRS bins<\u002Fspan>\n          <\u002Fdiv>\n\n          <div style=\"font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:#5E6E80;font-weight:700;margin-bottom:9px\">Demand window — switch to re-classify &amp; re-slot<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px\">\n            <sc-for list=\"{{ slotTagBtns }}\" as=\"b\" hint-placeholder-count=\"4\">\n              <button onclick=\"{{ b.onClick }}\" style=\"{{ b.style }}\">{{ b.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;gap:16px;align-items:stretch;flex-wrap:wrap\">\n            <!-- LEFT: ranked SKU table -->\n            <div style=\"flex:1;min-width:340px;background:#111922;border:1px solid #1C2530;border-radius:14px;overflow:hidden;align-self:flex-start\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid #1C2530\">\n                <span style=\"font-size:13px;font-weight:700\">Velocity ranking — {{ slotTagLabel }}<\u002Fspan>\n                <span style=\"font-size:10.5px;color:#5E6E80;font-family:'IBM Plex Mono',monospace\">units / window<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;padding:9px 16px;border-bottom:1px solid #1C2530;background:#0E141B;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:#5E6E80;font-weight:700\">\n                <span style=\"width:30px\">#<\u002Fspan><span style=\"flex:2\">SKU<\u002Fspan><span style=\"flex:1.1\">Units<\u002Fspan><span style=\"flex:1;text-align:right\">Class<\u002Fspan>\n              <\u002Fdiv>\n              <sc-for list=\"{{ slotRows }}\" as=\"s\" hint-placeholder-count=\"10\">\n                <div style=\"display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid #161F29\">\n                  <span style=\"width:30px;font-size:12px;font-weight:700;color:#5E6E80;font-family:'IBM Plex Mono',monospace\">{{ s.rank }}<\u002Fspan>\n                  <div style=\"flex:2;min-width:0\"><div style=\"font-size:12.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis\">{{ s.short }}<\u002Fdiv><div style=\"font-size:10px;color:#8A98A8\">{{ s.cat }}<\u002Fdiv><\u002Fdiv>\n                  <span style=\"flex:1.1;font-size:12px;color:#C3D0DD;font-family:'IBM Plex Mono',monospace\">{{ s.units }}<\u002Fspan>\n                  <span style=\"flex:1;display:flex;align-items:center;justify-content:flex-end;gap:7px\">\n                    <sc-if value=\"{{ s.moved }}\" hint-placeholder-val=\"\"><span style=\"font-size:10px;font-weight:700;color:{{ s.moveColor }};font-family:'IBM Plex Mono',monospace\">{{ s.moveText }}<\u002Fspan><\u002Fsc-if>\n                    <span style=\"{{ s.clsStyle }}\">{{ s.cls }}<\u002Fspan>\n                  <\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- RIGHT: slotting layout by proximity to GTP -->\n            <div style=\"flex:1.1;min-width:340px;background:#0B1119;border:1px solid #1C2530;border-radius:14px;padding:15px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:13px\">\n                <span style=\"font-size:13px;font-weight:700\">Slotting layout — proximity to GTP<\u002Fspan>\n                <span style=\"font-size:10.5px;color:#54E08A;font-weight:700;display:flex;align-items:center;gap:6px\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"12\" rx=\"1\"><\u002Frect><path d=\"M8 20h8\"><\u002Fpath><path d=\"M12 16v4\"><\u002Fpath><\u002Fsvg>GTP / Dispatch<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:10px;position:relative\">\n                <sc-for list=\"{{ slotZoneCols }}\" as=\"z\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;flex-direction:column\">\n                    <div style=\"{{ z.headStyle }}\">\n                      <div><div style=\"font-size:11.5px;font-weight:800;color:#EAF0F6\">{{ z.name }}<\u002Fdiv><div style=\"font-size:9px;color:#93A1B2\">{{ z.sub }}<\u002Fdiv><\u002Fdiv>\n                      <span style=\"{{ z.badgeStyle }}\">{{ z.cls }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"display:flex;flex-direction:column;gap:6px;min-height:60px\">\n                      <sc-for list=\"{{ z.items }}\" as=\"it\" hint-placeholder-count=\"2\">\n                        <div style=\"{{ it.chipStyle }}\">{{ it.short }}<\u002Fdiv>\n                      <\u002Fsc-for>\n                      <sc-if value=\"{{ z.empty }}\" hint-placeholder-val=\"\"><div style=\"padding:9px;border:1px dashed #233040;border-radius:8px;font-size:10px;color:#5E6E80;text-align:center\">empty<\u002Fdiv><\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:8px;margin-top:13px;padding-top:13px;border-top:1px solid #1C2530\">\n                <div style=\"flex:1;height:5px;border-radius:3px;background:linear-gradient(90deg,#54E08A,#3DA8FF,#9B8CFF,#5E6E80)\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:9.5px;color:#5E6E80;margin-top:5px\"><span>Closest to pick face<\u002Fspan><span>Far reserve bays<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px;max-width:900px;font-size:12px;color:#8A98A8;line-height:1.6\">Run on the <strong style=\"color:#C3D0DD\">Falcon Dubai<\u002Fstrong> master. The AI model recomputes velocity for each demand window — a body oil and beverage hold the <strong style=\"color:#54E08A\">golden zone<\u002Fstrong> at night, glue sticks and kids' snacks surge after school, and cleaning, chocolate &amp; gifting jump to the GTP face during <strong style=\"color:#C3D0DD\">Ramadan<\u002Fstrong>. Slotting re-writes automatically so the fastest movers always sit closest to the rack pick face.<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- BESPOKE: SKU Classification -->\n        <sc-if value=\"{{ capDetail.isSkuClass }}\" hint-placeholder-val=\"\">\n        <div>\n          <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-bottom:16px\">\n            <label for=\"fa-sku-file\" style=\"display:flex;align-items:center;gap:8px;padding:9px 15px;border-radius:9px;background:#5901E2;color:#fff;font-size:12.5px;font-weight:700;cursor:pointer\">\n              <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M17 8l-5-5-5 5\"><\u002Fpath><path d=\"M12 3v12\"><\u002Fpath><\u002Fsvg>Upload SKU master\n              <input id=\"fa-sku-file\" type=\"file\" accept=\".csv,.xlsx,.xls\" onchange=\"{{ onSkuFile }}\" style=\"display:none\">\n            <\u002Flabel>\n            <span style=\"font-size:11.5px;color:#5E6E80\">CSV / XLSX · SKU, description, weight, dimensions, pack type, daily demand<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- Real master stats + category mix -->\n          <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px\">\n            <sc-for list=\"{{ skuStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n              <div style=\"flex:1;min-width:140px;background:#111922;border:1px solid #1C2530;border-radius:12px;padding:13px 15px\">\n                <div style=\"font-size:11px;color:#8A98A8;font-weight:600;margin-bottom:7px\">{{ s.label }}<\u002Fdiv>\n                <div style=\"font-size:20px;font-weight:800;font-family:'IBM Plex Mono',monospace\">{{ s.value }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#111922;border:1px solid #1C2530;border-radius:12px;padding:14px 16px;margin-bottom:16px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:10px\"><span style=\"font-size:12px;font-weight:700\">Catalogue mix by category<\u002Fspan><span style=\"font-size:10.5px;color:#5E6E80;font-family:'IBM Plex Mono',monospace\">35 categories · Falcon Dubai DC<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex;height:12px;border-radius:6px;overflow:hidden;margin-bottom:11px\">\n              <sc-for list=\"{{ skuCatMix }}\" as=\"c\" hint-placeholder-count=\"6\"><div style=\"{{ c.segStyle }}\"><\u002Fdiv><\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:14px\">\n              <sc-for list=\"{{ skuCatMix }}\" as=\"c\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:7px\"><span style=\"{{ c.dotStyle }}\"><\u002Fspan><span style=\"font-size:11px;color:#C3D0DD\">{{ c.label }}<\u002Fspan><span style=\"font-size:11px;color:#5E6E80;font-family:'IBM Plex Mono',monospace\">{{ c.pct }}%<\u002Fspan><\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:#5E6E80;font-weight:700;margin-bottom:9px\">Dynamic context — classification re-ranks by demand pattern<\u002Fdiv>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px\">\n            <sc-for list=\"{{ skuCtxBtns }}\" as=\"b\" hint-placeholder-count=\"5\">\n              <button onclick=\"{{ b.onClick }}\" style=\"{{ b.style }}\">{{ b.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"background:#111922;border:1px solid #1C2530;border-radius:14px;overflow:hidden\">\n            <div style=\"display:flex;padding:11px 18px;border-bottom:1px solid #1C2530;background:#0E141B;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:#5E6E80;font-weight:700\">\n              <span style=\"flex:2\">Product<\u002Fspan><span style=\"flex:1.4\">Category<\u002Fspan><span style=\"flex:.9\">Weight<\u002Fspan><span style=\"flex:1.2\">Dimensions<\u002Fspan><span style=\"flex:.8\">Pack<\u002Fspan><span style=\"flex:1.1;text-align:right\">Class<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ skuRows }}\" as=\"s\" hint-placeholder-count=\"6\">\n              <div style=\"display:flex;align-items:center;padding:12px 18px;border-bottom:1px solid #161F29\">\n                <span style=\"flex:2;font-size:12.5px;font-weight:600\">{{ s.sku }}<\u002Fspan>\n                <span style=\"flex:1.4;font-size:11.5px;color:#8A98A8\">{{ s.name }}<\u002Fspan>\n                <span style=\"flex:.9;font-size:11.5px;color:#8A98A8;font-family:'IBM Plex Mono',monospace\">{{ s.wt }}<\u002Fspan>\n                <span style=\"flex:1.2;font-size:11px;color:#8A98A8;font-family:'IBM Plex Mono',monospace\">{{ s.dim }}<\u002Fspan>\n                <span style=\"flex:.8\"><span style=\"font-size:10.5px;font-weight:600;color:{{ s.packColor }}\">{{ s.pack }}<\u002Fspan><\u002Fspan>\n                <span style=\"flex:1.1;display:flex;align-items:center;justify-content:flex-end;gap:8px\">\n                  <sc-if value=\"{{ s.shifted }}\" hint-placeholder-val=\"\"><span style=\"font-size:9.5px;font-weight:700;color:#5901E2;background:#1A1230;padding:2px 6px;border-radius:5px;font-family:'IBM Plex Mono',monospace\">{{ s.shiftLabel }}<\u002Fspan><\u002Fsc-if>\n                  <span style=\"{{ s.clsStyle }}\">{{ s.cls }}<\u002Fspan>\n                <\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:13px;font-size:12px;color:#8A98A8;line-height:1.6;max-width:780px\">Live from the Falcon Dubai central-warehouse master — <strong style=\"color:#C3D0DD\">20,553 SKUs<\u002Fstrong>, weights and dimensions are actual. Velocity is recomputed continuously from dispatch demand, so a body oil or ramen cup holds Class A year-round, cleaner &amp; chocolate jump to Class A around Eid, and a speaker or plush toy to Class A on Black Friday. Slotting follows automatically.<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- BESPOKE: Capacity Planning -->\n        <sc-if value=\"{{ capDetail.isCapacity }}\" hint-placeholder-val=\"\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:860px\">\n          <sc-for list=\"{{ capacityRows }}\" as=\"c\" hint-placeholder-count=\"4\">\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:14px;padding:17px 18px\">\n              <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:14px\">\n                <span style=\"width:36px;height:36px;border-radius:10px;background:#0E141B;border:1px solid #233040;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5901E2\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" dangerouslysetinnerhtml=\"{{ c.iconHtml }}\"><\u002Fsvg><\u002Fspan>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-size:13.5px;font-weight:700\">{{ c.name }}<\u002Fdiv><div style=\"font-size:10.5px;color:#8A98A8\">{{ c.detail }}<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:right\"><div style=\"font-size:17px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:{{ c.color }}\">{{ c.pct }}%<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"height:8px;border-radius:5px;background:#0E141B;overflow:hidden;margin-bottom:9px\"><div style=\"height:100%;border-radius:5px;background:{{ c.color }};width:{{ c.barW }}\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex;justify-content:space-between;font-size:11px;color:#8A98A8\"><span><span style=\"color:#EAF0F6;font-weight:600;font-family:'IBM Plex Mono',monospace\">{{ c.used }}<\u002Fspan> / {{ c.max }} {{ c.unit }}<\u002Fspan><span>{{ c.head }}<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:14px;max-width:860px;background:#111922;border:1px solid #1C2530;border-left:2px solid #5901E2;border-radius:12px;padding:16px 18px;font-size:13px;color:#C3D0DD;line-height:1.6\">Sized for the <strong style=\"color:#fff;font-weight:700\">Falcon Dubai central warehouse<\u002Fstrong> feeding the last-mile store network — <strong style=\"color:#fff;font-weight:700\">20,553 SKUs<\u002Fstrong>, ~<strong style=\"color:#fff;font-weight:700\">4.78M units<\u002Fstrong> on hand at a 15-day DOI, dispatching <strong style=\"color:#fff;font-weight:700\">~636k units/day<\u002Fstrong>. Robo Advisor deliverable balances human, robot, GTP and 50,086 ASRS bins together, holding ~14% headroom before a second shuttle aisle or shift extension is recommended.<\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- BESPOKE: Task Monitor process flow -->\n        <sc-if value=\"{{ capDetail.isTaskMonitor }}\" hint-placeholder-val=\"\">\n        <div style=\"margin-bottom:20px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n            <div style=\"font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:#5E6E80;font-weight:700\">E-commerce central warehouse · order-to-last-mile flow<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:7px;font-size:11px;color:#FF5D6B;font-weight:700\"><span style=\"width:8px;height:8px;border-radius:50%;background:#FF5D6B\"><\u002Fspan>Bottleneck vs target<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:stretch;gap:8px;overflow-x:auto;padding-bottom:6px\">\n            <sc-for list=\"{{ processFlow }}\" as=\"p\" hint-placeholder-count=\"8\">\n              <div style=\"display:flex;align-items:center;gap:8px;flex:1;min-width:150px\">\n                <div style=\"{{ p.cardStyle }}\">\n                  <sc-if value=\"{{ p.badge }}\" hint-placeholder-val=\"\"><span style=\"position:absolute;top:-8px;left:13px;font-size:8.5px;font-weight:800;letter-spacing:.4px;color:#fff;background:#FF5D6B;padding:2px 7px;border-radius:5px\">{{ p.badge }}<\u002Fspan><\u002Fsc-if>\n                  <div style=\"font-size:9.5px;color:#5E6E80;font-family:'IBM Plex Mono',monospace;margin-bottom:5px\">{{ p.stage }}<\u002Fdiv>\n                  <div style=\"font-size:12.5px;font-weight:700;line-height:1.25;margin-bottom:10px\">{{ p.name }}<\u002Fdiv>\n                  <div style=\"font-size:16px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:{{ p.pctColor }}\">{{ p.actual }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#8A98A8;margin-bottom:8px\">/ {{ p.target }} target u/hr<\u002Fdiv>\n                  <div style=\"height:5px;border-radius:3px;background:#0E141B;overflow:hidden\"><div style=\"height:100%;border-radius:3px;background:{{ p.barColor }};width:{{ p.barW }}\"><\u002Fdiv><\u002Fdiv>\n                  <div style=\"font-size:10px;font-weight:700;color:{{ p.pctColor }};margin-top:5px;font-family:'IBM Plex Mono',monospace\">{{ p.pctTarget }}% of target<\u002Fdiv>\n                <\u002Fdiv>\n                <sc-if value=\"{{ p.notLast }}\" hint-placeholder-val=\"{{ true }}\">\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3A4756\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"flex:none\"><path d=\"M5 12h14\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:12px;background:#1A0E12;border:1px solid #FF5D6B44;border-radius:12px;padding:14px 18px;font-size:13px;color:#FFC9CF;line-height:1.6\"><strong style=\"color:#fff\">Sortation is the constraint<\u002Fstrong> — running at 82% of target (≈21,200 of 26,000 u/hr) while upstream stages hold ≥88%. On ~636k units/day to the Dubai last-mile network that caps daily output; the AI Decision Engine is rebalancing cross-belt induction and has flagged a 2nd sorter lane in the Workshop Robo Advisor deliverable. Every downstream stage (dispatch, last-mile) is paced by it.<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <!-- BESPOKE: Robot Control Tower -->\n        <sc-if value=\"{{ capDetail.isRobotTower }}\" hint-placeholder-val=\"\">\n        <div style=\"display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px\">\n          <sc-for list=\"{{ capDetail.kpis }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <div style=\"flex:1;min-width:150px;background:#111922;border:1px solid #1C2530;border-radius:14px;padding:15px 17px\">\n              <div style=\"font-size:11.5px;color:#8A98A8;font-weight:600;margin-bottom:9px\">{{ k.label }}<\u002Fdiv>\n              <div style=\"font-size:23px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:{{ k.color }}\">{{ k.value }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002F Mono',monospace;font-size:11.5px;font-weight:600;color:{{ r.utilColor }};flex:none\">{{ r.util }}<\u002Fspan>\n              <\u002Fdiv>\n              <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#C3D0DD\">{{ r.rt }}<\u002Fspan>\n              <div style=\"display:flex;justify-content:center\">\n                <button onclick=\"{{ r.onReset }}\" style=\"{{ r.resetStyle }}\"><span style=\"{{ r.knobStyle }}\"><\u002Fspan><\u002Fbutton>\n              <\u002Fdiv>\n              <div style=\"display:flex;justify-content:flex-end\">\n                <button onclick=\"{{ r.onUpload }}\" style=\"display:flex;align-items:center;gap:6px;padding:7px 11px;border-radius:8px;background:transparent;border:1px solid #233040;color:#C3D0DD;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer\">\n                  <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M17 8l-5-5-5 5\"><\u002Fpath><path d=\"M12 3v12\"><\u002Fpath><\u002Fsvg>Upload\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"margin-top:13px;max-width:920px;font-size:12px;color:#8A98A8;line-height:1.6\">Each robot type runs its own Device Agent. <strong style=\"color:#C3D0DD\">Reset<\u002Fstrong> safely re-homes and re-initialises a fleet; <strong style=\"color:#C3D0DD\">Upload<\u002Fstrong> stages a new software build, validated in WH-Twin before it reaches the live floor. Fixed arms (palletizing / depalletizing) are mains-powered — shown as <span style=\"font-family:'IBM Plex Mono',monospace\">AC<\u002Fspan>.<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- Toast -->\n  <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"\">\n  <div style=\"position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:90;display:flex;align-items:center;gap:11px;padding:13px 18px;border-radius:11px;background:#171026;border:1px solid #3A2470;box-shadow:0 18px 50px rgba(0,0,0,.55);animation:fa-fade .22s ease\">\n    <span style=\"width:8px;height:8px;border-radius:50%;background:#5901E2;flex:none;box-shadow:0 0 9px #5901E2\"><\u002Fspan>\n    <span style=\"font-size:12.5px;font-weight:600;color:#EAF0F6\">{{ toast }}<\u002Fspan>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n      <!-- ========================= AI COPILOT PANEL ========================= -->\n      <div style=\"position:fixed;bottom:24px;right:24px;z-index:9999;width:360px\">\n        <sc-if value=\"{{ copilotOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"background:rgba(6,8,12,.94);backdrop-filter:blur(20px);border:1px solid rgba(155,140,255,.3);border-radius:20px;overflow:hidden;box-shadow:0 0 40px rgba(81,12,217,.2);animation:fa-fade .25s ease\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid rgba(155,140,255,.15)\">\n            <div style=\"display:flex;align-items:center;gap:10px\">\n              <div style=\"width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#510cd9,#7a3ae0);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff\">✦<\u002Fdiv>\n              <div>\n                <div style=\"font-size:13px;font-weight:700;color:#EAF0F6\">Flow AI<\u002Fdiv>\n                <div style=\"font-size:9px;color:#9B8CFF;letter-spacing:.5px\">AI Copilot<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ copilotClose }}\" style=\"background:transparent;border:none;color:#5E6E80;cursor:pointer;font-size:18px;padding:2px 6px;line-height:1\">—<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"max-height:320px;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px\">\n            <sc-for list=\"{{ copilotMessages }}\" as=\"cm\" hint-placeholder-count=\"4\">\n              <div style=\"{{ cm.wrapStyle }}\">\n                <div style=\"{{ cm.style }}\">{{ cm.text }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"padding:10px 14px;border-top:1px solid rgba(155,140,255,.1);display:flex;gap:8px\">\n            <input style=\"flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(155,140,255,.2);border-radius:10px;padding:8px 12px;font-size:12px;color:#EAF0F6;outline:none\" placeholder=\"Ask about this view...\">\n            <button style=\"padding:8px 14px;border-radius:10px;background:linear-gradient(135deg,#510cd9,#7a3ae0);color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer\">Send<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:flex;justify-content:flex-end;margin-top:8px\">\n          <button onclick=\"{{ copilotToggle }}\" style=\"width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#510cd9,#7a3ae0);border:none;cursor:pointer;box-shadow:0 0 24px rgba(81,12,217,.4);display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff\">✦<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;taskMonitorLayer&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Twin · Visualization&quot;,&quot;Warehouse Execution · WES&quot;,&quot;Warehouse Control · WCS&quot;,&quot;Data Fabric · Core&quot;],&quot;default&quot;:&quot;Warehouse Execution · WES&quot;,&quot;tsType&quot;:&quot;string&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'tower',\n    t: 0,\n    clock: '08:42:17',\n    aiDecisions: 47,\n    robots: [],\n    selectedRobot: 0,\n    selectedAsset: { type:'robot', id:0 },\n    selectedCap: 'Role Dashboards',\n    twinMode: 'robots',\n    autopilot: true,\n    towerRange: '12h',\n    siteIdx: 0,\n    bellOpen: false,\n    toast: null,\n    resetOn: {},\n    optRow: {},\n    plcDiagram: null,\n    plcCfg: {},\n    slotTag: 'morning',\n    slotPrev: 'morning',\n    routePaths: { 'RBT-01': ['IN1','R3','G1','OUT1'] },\n    robotPos: {},\n    routeModalRobot: null,\n    routeDraft: [],\n    robotDur: {},\n    robotVisible: { 'RBT-01': true, 'RBT-02': true, 'RBT-03': true },\n    workshopTab: 'scene',\n    sandboxRunning: false,\n    sandboxSpeed: 1,\n    sandboxT: 0,\n    optOn: [true, true, true, false],\n    skuContext: 'normal',\n    cadName: 'DXB-DC-01_layout_rev3.dwg',\n    throughputVals: [22800,24100,25600,24900,26200,26900,26400,27200,26100,25400,26600,25900],\n    copilotOpen: false,\n    agentLogHistory: [],\n  };\n\n  toast(msg) {\n    this.setState({ toast: msg });\n    clearTimeout(this._toastTimer);\n    this._toastTimer = setTimeout(() => this.setState({ toast: null }), 2600);\n  }\n\n  componentDidMount() {\n    this.seedRobots();\n    const seed=[];for(let i=0;i<8;i++)seed.push(this._genLogEntry(this.state.selectedAsset,[],i));this.setState({agentLogHistory:seed});\n    this._timer = setInterval(() => this.tick(), 1300);\n    this.tick();\n    this._robotTimers = {};\n    Object.keys(this.state.routePaths||{}).forEach(id => this.startRobot(id));\n  }\n  componentWillUnmount() { clearInterval(this._timer); if(this._robotTimers) Object.values(this._robotTimers).forEach(t=>clearTimeout(t)); }\n\n  // ---- Routing & Divert: robot path designer ----\n  pointDefs() {\n    return [\n      { id:'IN1', label:'Inbound', type:'inbound', x:92, y:15 },\n      { id:'R1', label:'Rack A1', type:'rack', x:28, y:22 },\n      { id:'R2', label:'Rack A2', type:'rack', x:40, y:22 },\n      { id:'R3', label:'Rack A3', type:'rack', x:52, y:22 },\n      { id:'R4', label:'Rack A4', type:'rack', x:64, y:22 },\n      { id:'R5', label:'Rack B1', type:'rack', x:28, y:74 },\n      { id:'R6', label:'Rack B2', type:'rack', x:40, y:74 },\n      { id:'R7', label:'Rack B3', type:'rack', x:52, y:74 },\n      { id:'R8', label:'Rack B4', type:'rack', x:64, y:74 },\n      { id:'G1', label:'GTP 1', type:'gtp', x:79, y:30 },\n      { id:'G2', label:'GTP 2', type:'gtp', x:79, y:55 },\n      { id:'G3', label:'GTP 3', type:'gtp', x:79, y:80 },\n      { id:'OUT1', label:'Outbound 1', type:'outbound', x:93, y:38 },\n      { id:'OUT2', label:'Outbound 2', type:'outbound', x:93, y:66 },\n    ];\n  }\n  robotDefs() {\n    return [\n      { id:'RBT-01', color:'#54E08A', start:{x:14,y:40} },\n      { id:'RBT-02', color:'#3DA8FF', start:{x:14,y:60} },\n      { id:'RBT-03', color:'#F5B53D', start:{x:20,y:50} },\n    ];\n  }\n  openRoute(id){ const p=(this.state.routePaths||{})[id]||[]; this.setState({ routeModalRobot:id, routeDraft:[...p] }); }\n  closeRoute(){ this.setState({ routeModalRobot:null, routeDraft:[] }); }\n  draftAdd(pid){ this.setState(s=>({ routeDraft:[...(s.routeDraft||[]), pid] })); }\n  draftRemove(i){ this.setState(s=>({ routeDraft:(s.routeDraft||[]).filter((_,j)=>j!==i) })); }\n  draftClear(){ this.setState({ routeDraft:[] }); }\n  toggleRobotVis(id){ const m={...(this.state.robotVisible||{})}; m[id] = (m[id]===false) ? true : false; this.setState({ robotVisible:m }); }\n  saveRoute(){\n    const id=this.state.routeModalRobot; if(!id) return;\n    const draft=[...(this.state.routeDraft||[])];\n    if(draft.length<2){ this.toast('Add at least two waypoints'); return; }\n    const paths={...(this.state.routePaths||{})}; paths[id]=draft;\n    this.setState({ routePaths:paths, routeModalRobot:null, routeDraft:[] }, ()=>this.startRobot(id));\n    this.toast('Route saved · '+id+' running '+draft.length+' waypoints');\n  }\n  startRobot(id){\n    if(!this._robotTimers) this._robotTimers={};\n    if(this._robotTimers[id]) clearTimeout(this._robotTimers[id]);\n    const path=(this.state.routePaths||{})[id]; if(!path||path.length<2) return;\n    const pts={}; this.pointDefs().forEach(p=>pts[p.id]=p);\n    const SPEED=20; // % units / second — constant on forward AND return legs\n    const startPos=(this.robotDefs().find(r=>r.id===id)||{start:{x:50,y:50}}).start;\n    let i=0;\n    const step=()=>{\n      const nxt=pts[path[i%path.length]]; if(!nxt) return;\n      const cur=(this.state.robotPos||{})[id] || startPos;\n      const dx=nxt.x-cur.x, dy=nxt.y-cur.y;\n      const dur=Math.max(0.45, Math.sqrt(dx*dx+dy*dy)/SPEED);\n      const pos={...(this.state.robotPos||{})}; pos[id]={x:nxt.x,y:nxt.y};\n      const durs={...(this.state.robotDur||{})}; durs[id]=dur;\n      this.setState({ robotPos:pos, robotDur:durs });\n      i++; this._robotTimers[id]=setTimeout(step, dur*1000+70);\n    };\n    step();\n  }\n\n  seedRobots() {\n    const vendors = ['Geek+','Hai Robotics','Quicktron','Hikrobot'];\n    const zones = ['A','B','C','D','E','F'];\n    const robots = [];\n    for (let i = 0; i < 12; i++) {\n      const lane = i % 6;\n      robots.push({\n        id: 'AMR-' + String(207 + i).padStart(3,'0'),\n        vendor: vendors[i % vendors.length],\n        battery: 45 + Math.floor(Math.random()*52),\n        status: i===3 ? 'fault' : (i===7||i===9 ? 'charging' : 'active'),\n        zone: zones[lane],\n        x: 10 + Math.random()*78,\n        y: 12 + lane*14 + Math.random()*4,\n        speed: (0.9 + Math.random()*0.9).toFixed(1),\n        task: 'PICK-' + (4800 + i*7),\n      });\n    }\n    this.setState({ robots });\n  }\n\n  tick() {\n    const now = new Date();\n    const clock = now.toTimeString().slice(0,8);\n    const auto = this.state.autopilot;\n    const robots = (this.state.robots||[]).map(r => {\n      if (r.status !== 'active' || !auto) return r;\n      let nx = r.x + (Math.random()*9 - 4.5);\n      let ny = r.y + (Math.random()*5 - 2.5);\n      nx = Math.max(6, Math.min(92, nx));\n      ny = Math.max(8, Math.min(88, ny));\n      return { ...r, x: nx, y: ny, battery: Math.max(8, r.battery - (Math.random()<0.3?1:0)) };\n    });\n    const tv = auto\n      ? this.state.throughputVals.slice(1).concat([24000 + Math.floor(Math.random()*3500)])\n      : this.state.throughputVals;\n    this.setState({\n      t: this.state.t + 1,\n      clock,\n      robots,\n      throughputVals: tv,\n      sandboxT: this.state.sandboxRunning ? (this.state.sandboxT||0) + (this.state.sandboxSpeed||1) : (this.state.sandboxT||0),\n      aiDecisions: auto ? 42 + Math.floor(Math.random()*14) : this.state.aiDecisions,\n      agentLogHistory:(()=>{const e=this._genLogEntry(this.state.selectedAsset,robots,this.state.t+1);e.time=clock;return[...(this.state.agentLogHistory||[]),e].slice(-60);})(),\n    });\n  }\n\n  _genLogEntry(sel,robots,t){\n    const pad=n=>String(n).padStart(2,'0');\n    const W={name:'WES-Agent',color:'#9B8CFF',border:'rgba(155,140,255,.22)'};\n    const D={name:'DCS-Agent',color:'#3DA8FF',border:'rgba(61,168,255,.22)'};\n    const M={name:'Monitor-Agent',color:'#F5B53D',border:'rgba(245,181,61,.22)'};\n    const S={name:'Scheduler-Agent',color:'#54E08A',border:'rgba(84,224,138,.22)'};\n    const A={name:'AI-Planner',color:'#9B8CFF',border:'rgba(155,140,255,.22)'};\n    const r=(robots||[])[sel?sel.id:0]||{};\n    const rid=r.id||'AMR-207',rzn=r.zone||'A',rtask=r.task||'PICK-4800',rbatt=r.battery||56,wave=2048+(t%4),T=t;\n    let pool;\n    const type=(sel&&sel.type)||'robot';\n    if(type==='robot'){pool=[\n      {ag:W,action:'ROUTE_OPTIMIZED',    detail:'Aisle A'+(1+T%3)+' congestion ('+(62+T%18)+'%). Dijkstra recalculated: Zone '+rzn+' → junction W-3 → rack-'+rtask.slice(-4)+'. Confidence: '+(91+T%7)+'%.'},\n      {ag:D,action:'COMMAND_DISPATCHED', detail:'VDA5050 to '+rid+' (x:'+(38+T%12)+'.'+(T%9)+', y:'+(52+T%8)+'.'+(T%7)+'). WH-N'+(42+T%10)+' → rack-'+rzn+(4+T%6)+'. Latency: '+(9+T%6)+'ms.'},\n      {ag:W,action:'TASK_ASSIGNED',      detail:'WV-'+wave+' pick #'+(4800+T%100)+' → '+rid+'. '+(T%5===0?'VIP':T%3===0?'EXPRESS':'STANDARD')+'. AI score '+(88+T%10)+'.'+(T%9)+'.'},\n      {ag:M,action:'TELEMETRY_UPDATE',   detail:'Heartbeat #'+(1240+T)+'. Batt '+rbatt+'%, motor '+(38+T%8)+'°C, LiDAR '+(1330+T%40)+' pts/scan, pos '+(97+T%3)+'.'+(T%9)+'%.'},\n      {ag:S,action:'UTILIZATION_CHECK',  detail:rid+' queue '+(1+T%3)+'. Zone '+rzn+' load '+(72+T%16)+'%. Pre-pos: '+(T%2===0?'aisle A2':'dock SD-0'+(1+T%3))+'. '+(83+T%12)+'% conf.'},\n      {ag:W,action:'WAVE_DECOMPOSED',    detail:'WV-'+wave+' → '+(12+T%6)+' tasks, '+(4+T%4)+' batched, '+(9-T%3)+' AMRs. Forecast: '+(1280+T%60)+' u/hr (+'+( T%15)+'% AI uplift).'},\n      {ag:D,action:'POSITION_CONFIRMED', detail:'Ack '+rid+': x:'+(38+T%12)+'.'+(T+2)%9+' y:'+(52+T%8)+'.'+(T+3)%7+'. Drift 0.00'+(3+T%4)+'m, map '+(98+T%2)+'.'+(T%8)+'%.'},\n      {ag:A,action:'SCORING_UPDATED',    detail:rid+' pool '+(18+T%8)+'. Winner #'+(4820+T%80)+' score='+(91+T%8)+'.'+(T%9)+' (SLA×1.'+(3+T%4)+' prox×1.'+(1+T%3)+').'},\n      {ag:M,action:'BATTERY_FORECAST',   detail:rbatt+'% → T+'+(Math.max(18,(rbatt*0.8)|0))+'min. CS-0'+(1+T%3)+' ETA '+(3+T%4)+'min. '+(rbatt<40?'Charge queued.':'Monitoring.')},\n      {ag:S,action:'FLEET_REBALANCE',    detail:'Zone '+rzn+' +'+(12+T%8)+'%. AMR-'+(210+T%5)+' from C. ETA T+'+(5+T%4)+'min. 0 tasks interrupted.'},\n      {ag:W,action:'SLA_EVALUATED',      detail:'WV-'+wave+': '+(8+T%5)+' on-time ('+(88+T%10)+'%), '+(T%3)+' at-risk. '+(T%4===0?'Mitigation triggered.':'All on track.')},\n      {ag:A,action:'BOTTLENECK_DETECTED',detail:'Junction W-3 at '+(72+T%18)+'%. Bottleneck T+'+(6+T%8)+'min. Pre-stage '+(T%2+2)+' AMRs at buffer B.'},\n      {ag:M,action:'ANOMALY_SCAN',       detail:'Scan #'+(T+422)+' — encoder σ='+(T%3)+'.'+(T%9)+'. Health '+(94-T%8)+'/100. No action required.'},\n      {ag:D,action:'FIRMWARE_ACK',       detail:rid+' profile: '+(T%5===0?'1.2':'1.6')+' m/s ('+(T%5===0?'congested':'standard')+'). FW v2.'+(4+T%3)+'.'+(T%8)+'.'},\n    ];}else if(type==='shuttle'){pool=[\n      {ag:D,action:'CYCLE_DISPATCHED',   detail:'SH-0'+(1+(sel?sel.id:0))+': T-'+(8800+T%200)+' from L'+(4+T%4)+' slot '+(12+T%8)+'. ETA '+(3+T%3)+'.'+(T%8)+'s, CPH '+(140+T%20)+'.'},\n      {ag:W,action:'LEVEL_ASSIGNED',     detail:'L'+(4+T%4)+' for SKU '+(42000+T%6000)+' ('+(12+T%8)+' units). Saves '+(2+T%3)+'s/cycle. Energy '+(8+T%5)+' kJ.'},\n      {ag:M,action:'MECHANICAL_CHECK',   detail:'Chain '+(94+T%6)+'%, lift '+(12+T%4)+'A/18A. Cycles '+(48000+T*10)+'. PM '+(120+T%80)+'h remaining.'},\n      {ag:A,action:'THROUGHPUT_OPTIMIZED',detail:'Re-ordered '+(6+T%4)+' tasks. CPH +'+( 8+T%10)+'%. L'+(3+T%5)+' > '+(78+T%12)+'% → '+(T%3+1)+' SKUs to L'+(6+T%3)+'.'},\n    ];}else if(type==='gtp'){pool=[\n      {ag:W,action:'TOTE_SEQUENCED',     detail:'GTP-'+(1+(sel?sel.id:0))+': '+(4+T%4)+' totes by density. Next ETA '+(T%8+1)+'s, buffer '+(3+T%4)+' totes.'},\n      {ag:D,action:'CONVEYOR_SYNC',      detail:'Spacing '+(T%2)+'.'+(4+T%5)+'m, 0.8m/s. Buffer '+(3+T%4)+' totes. Photoeye CLEAR. Latency '+(5+T%4)+'ms.'},\n      {ag:M,action:'OPERATOR_METRICS',   detail:''+(288+T%40)+' picks/hr. Fatigue '+(22+T%15)+'%. Avg '+(4+T%3)+'.'+(T%8)+'s. Error 0.0'+(T%4)+'%.'},\n      {ag:A,action:'DEMAND_FORECAST',    detail:'30min inbound '+(280+T%60)+' totes. A '+(58+T%12)+'% B '+(28+T%8)+'% C '+(14+T%5)+'%. Conf '+(85+T%10)+'%.'},\n    ];}else{pool=[\n      {ag:D,action:'ASSET_MONITORED',    detail:'Throughput '+(1180+T%80)+' u/hr. Jams: '+(T%8===0?'1 (auto-resolved)':'none')+'. Load '+(68+T%15)+'%.'},\n      {ag:W,action:'FLOW_OPTIMIZED',     detail:'Capacity '+(82+T%10)+'% in T+'+(8+T%6)+'min. Shift '+(T%2+1)+' waves. Headroom +'+(14+T%6)+'%.'},\n      {ag:M,action:'SENSOR_NOMINAL',     detail:'Photoeye '+(8+T%4)+'/8. Vibration '+(T%3)+'.'+(T%7)+'. Belt wear '+(22+T%15)+'%.'},\n    ];}\n    const e=pool[T%pool.length];\n    return{agent:e.ag.name,agentColor:e.ag.color,borderColor:e.ag.borde

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,0,0,.45) 10px,rgba(0,0,0,.45) 11px),repeating-linear-gradient(90deg,transparent 0,transparent 22px,rgba(0,0,0,.4) 22px,rgba(0,0,0,.4) 23px);transform:translateZ(44px);box-shadow:-9px 12px 0 -1px #0A1117,0 30px 26px rgba(0,0,0,.5)\"><\u002Fdiv>\n                <sc-for list=\"{{ shuttles }}\" as=\"s\" hint-placeholder-count=\"4\">\n                  <div onclick=\"{{ s.onClick }}\" style=\"{{ s.style }}\"><\u002Fdiv>\n                <\u002Fsc-for>\n\n                <!-- GTP stations -->\n                <sc-for list=\"{{ gtps }}\" as=\"g\" hint-placeholder-count=\"3\">\n                  <div onclick=\"{{ g.onClick }}\" style=\"{{ g.style }}\"><\u002Fdiv>\n                <\u002Fsc-for>\n\n                <!-- AMRs -->\n                <sc-for list=\"{{ twinRobots }}\" as=\"rb\" hint-placeholder-count=\"12\">\n                  <div onclick=\"{{ rb.onClick }}\" style=\"{{ rb.style }}\"><\u002Fdiv>\n                <\u002Fsc-for>\n\n                <!-- Heatmap overlay -->\n                <sc-if value=\"{{ isHeatMode }}\" hint-placeholder-val=\"\">\n                  <sc-for list=\"{{ heatPatches }}\" as=\"h\" hint-placeholder-count=\"6\">\n                    <div style=\"{{ h.style }}\"><\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fsc-if>\n\n                <!-- Task paths overlay -->\n                <sc-if value=\"{{ isTasksMode }}\" hint-placeholder-val=\"\">\n                  <svg viewBox=\"0 0 100 100\" preserveAspectRatio=\"none\" style=\"position:absolute;inset:0;width:100%;height:100%;overflow:visible;transform:translateZ(20px);pointer-events:none\">\n                    <sc-for list=\"{{ taskLines }}\" as=\"t\" hint-placeholder-count=\"6\">\n                      <line x1=\"{{ t.x1 }}\" y1=\"{{ t.y1 }}\" x2=\"{{ t.x2 }}\" y2=\"{{ t.y2 }}\" stroke=\"#7A3CEF\" stroke-width=\"0.5\" stroke-dasharray=\"2 1.3\" stroke-linecap=\"round\" opacity=\"0.85\"><\u002Fline>\n                      <circle cx=\"{{ t.tx }}\" cy=\"{{ t.ty }}\" r=\"1.1\" fill=\"#7A3CEF\"><\u002Fcircle>\n                    <\u002Fsc-for>\n                  <\u002Fsvg>\n                  <sc-for list=\"{{ taskChips }}\" as=\"c\" hint-placeholder-count=\"5\">\n                    <div style=\"{{ c.style }}\">{{ c.label }}<\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"position:absolute;bottom:16px;left:18px;font-size:11px;color:#5E6E80\">Click any asset — aisle · 4-way shuttle · conveyor · GTP · AMR — for live metrics<\u002Fdiv>\n            <div style=\"position:absolute;bottom:16px;right:18px;display:flex;gap:14px;font-size:10px;color:#8A98A8\">\n              <span>▦ Racking<\u002Fspan><span>▤ Pallet<\u002Fspan><span>▥ ASRS<\u002Fspan><span style=\"color:#F5B53D\">▢ GTP<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SIDE RAIL -->\n          <div style=\"display:flex;flex-direction:column;gap:14px;height:calc(100vh - 270px);overflow:hidden\">\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:18px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n                <div style=\"font-family:'IBM Plex Mono',monospace;font-size:14.5px;font-weight:600;color:#fff\">{{ insp.title }}<\u002Fdiv>\n                <span style=\"font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:6px;text-transform:capitalize;background:rgba(84,224,138,.13);color:{{ insp.badgeColor }}\">{{ insp.badge }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:11px\">\n                <sc-for list=\"{{ insp.fields }}\" as=\"f\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;justify-content:space-between;font-size:12.5px\"><span style=\"color:#8A98A8\">{{ f.k }}<\u002Fspan><span style=\"{{ f.vStyle }}\">{{ f.v }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"margin-top:2px\">\n                  <div style=\"display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:6px\"><span style=\"color:#8A98A8\">{{ insp.barLabel }}<\u002Fspan><span style=\"font-weight:700;color:{{ insp.barColor }};font-family:'IBM Plex Mono',monospace\">{{ insp.barPct }}%<\u002Fspan><\u002Fdiv>\n                  <div style=\"height:7px;border-radius:4px;background:#0E141B;overflow:hidden\"><div style=\"height:100%;border-radius:4px;background:{{ insp.barColor }};width:{{ insp.barW }}\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:16px 18px\">\n              <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px\">\n                <sc-for list=\"{{ twinSummary }}\" as=\"s\" hint-placeholder-count=\"3\">\n                  <div><div style=\"font-size:17px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:{{ s.color }}\">{{ s.value }}<\u002Fdiv><div style=\"font-size:10px;color:#8A98A8;margin-top:2px\">{{ s.label }}<\u002Fdiv><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:16px 18px;flex:1;overflow:hidden;display:flex;flex-direction:column\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0\">\n                <div style=\"font-size:13px;font-weight:700\">Agent execution log<\u002Fdiv>\n                <span style=\"font-size:9.5px;color:#54E08A;font-family:'IBM Plex Mono',monospace;animation:fa-blink 2s infinite\">● LIVE<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:10px;color:#5E6E80;margin-bottom:8px;flex-shrink:0;font-family:'IBM Plex Mono',monospace\">{{ insp.title }} · {{ agentLog.length }} events<\u002Fdiv>\n              <div id=\"agentLogEl\" style=\"display:flex;flex-direction:column;gap:7px;overflow-y:auto;flex:1\">\n                <sc-for list=\"{{ agentLog }}\" as=\"entry\" hint-placeholder-count=\"8\">\n                  <div style=\"background:#0D141C;border:1px solid {{ entry.borderColor }};border-radius:10px;padding:10px 12px;animation:fa-fade .4s ease\">\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:4px\">\n                      <span style=\"font-size:9px;font-weight:700;letter-spacing:.9px;color:{{ entry.agentColor }};text-transform:uppercase\">{{ entry.agent }}<\u002Fspan>\n                      <span style=\"font-size:9px;color:#5E6E80;font-family:'IBM Plex Mono',monospace\">{{ entry.time }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div style=\"font-size:11px;font-weight:600;color:#EAF0F6;margin-bottom:4px\">{{ entry.action }}<\u002Fdiv>\n                    <div style=\"font-size:10px;color:#8A98A8;line-height:1.55\">{{ entry.detail }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ========================= FLEET / ROBOLINK ========================= -->\n      <sc-if value=\"{{ isFleet }}\" hint-placeholder-val=\"{{ true }}\">\n      <section data-screen-label=\"Fleet RoboLink\" style=\"padding:24px 28px 40px\">\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:1.6px;color:#5901E2;text-transform:uppercase;font-weight:700;margin-bottom:5px\">RoboLink · Device Agent layer<\u002Fdiv>\n          <h1 style=\"margin:0;font-size:25px;font-weight:800;letter-spacing:-.5px\">Fleet &amp; device orchestration<\u002Fh1>\n          <p style=\"margin:5px 0 0;font-size:13.5px;color:#8A98A8\">One standard Device Agent per vendor — like USB for warehouse hardware. New vendor = one Agent file, zero integration code.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1.55fr 1fr;gap:16px\">\n          <!-- Fleet table -->\n          <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;overflow:hidden\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #1C2530\">\n              <div style=\"font-size:14px;font-weight:700\">Live fleet — {{ fleetTotal }} assets<\u002Fdiv>\n              <span style=\"font-size:11px;color:#8A98A8;font-family:'IBM Plex Mono',monospace\">VDA 5050 · Modbus · OPC-UA<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:grid;grid-template-columns:1.1fr 1fr .8fr 1fr .7fr;padding:11px 20px;font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;color:#5E6E80;font-weight:700;border-bottom:1px solid #161F29\">\n              <span>Robot<\u002Fspan><span>Vendor<\u002Fspan><span>Zone<\u002Fspan><span>Task<\u002Fspan><span style=\"text-align:right\">Battery<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"max-height:430px;overflow-y:auto\">\n              <sc-for list=\"{{ fleetRows }}\" as=\"r\" hint-placeholder-count=\"12\">\n                <div style=\"display:grid;grid-template-columns:1.1fr 1fr .8fr 1fr .7fr;align-items:center;padding:13px 20px;border-bottom:1px solid #161F29\">\n                  <div style=\"display:flex;align-items:center;gap:9px\"><span style=\"width:8px;height:8px;border-radius:50%;background:{{ r.statusColor }};flex:none\"><\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600\">{{ r.id }}<\u002Fspan><\u002Fdiv>\n                  <span style=\"font-size:12.5px;color:#C3D0DD\">{{ r.vendor }}<\u002Fspan>\n                  <span style=\"font-size:12px;color:#8A98A8\">{{ r.zone }}<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#8A98A8\">{{ r.task }}<\u002Fspan>\n                  <span style=\"text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600;color:{{ r.batteryColor }}\">{{ r.battery }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Device agents -->\n          <div style=\"display:flex;flex-direction:column;gap:14px\">\n            <div style=\"background:linear-gradient(160deg,#10202A,#111922);border:1px solid #1C3A33;border-radius:16px;padding:18px 20px\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px\">\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#54E08A\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M7 8V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3\"><\u002Fpath><path d=\"M13 8V5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v3\"><\u002Fpath><path d=\"M5 8h14v3a7 7 0 0 1-7 7 7 7 0 0 1-7-7Z\"><\u002Fpath><path d=\"M12 18v3\"><\u002Fpath><\u002Fsvg>\n                <div style=\"font-size:14px;font-weight:700\">Device Agents<\u002Fdiv>\n              <\u002Fdiv>\n              <p style=\"margin:0;font-size:12px;color:#8A98A8;line-height:1.5\">Every vendor speaks its own dialect; RoboLink normalises once. The RCS core is never re-engineered.<\u002Fp>\n              <div style=\"display:flex;gap:20px;margin-top:14px\">\n                <div><div style=\"font-size:22px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:#54E08A\">8<\u002Fdiv><div style=\"font-size:11px;color:#8A98A8\">vendor agents<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:22px;font-weight:800;font-family:'IBM Plex Mono',monospace\">0%<\u002Fdiv><div style=\"font-size:11px;color:#8A98A8\">custom code<\u002Fdiv><\u002Fdiv>\n                <div><div style=\"font-size:22px;font-weight:800;font-family:'IBM Plex Mono',monospace\">days<\u002Fdiv><div style=\"font-size:11px;color:#8A98A8\">to onboard<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:8px 0;flex:1\">\n              <sc-for list=\"{{ deviceAgents }}\" as=\"d\" hint-placeholder-count=\"8\">\n                <div style=\"display:flex;align-items:center;gap:12px;padding:11px 18px;border-bottom:1px solid #161F29\">\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:{{ d.color }};flex:none\"><\u002Fspan>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font-size:12.5px;font-weight:600\">{{ d.vendor }} <span style=\"color:#5E6E80;font-weight:500\">· {{ d.type }}<\u002Fspan><\u002Fdiv>\n                    <div style=\"font-size:10.5px;color:#8A98A8;font-family:'IBM Plex Mono',monospace;margin-top:2px\">{{ d.proto }} · {{ d.units }} units · {{ d.lat }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"font-size:10.5px;font-weight:700;color:{{ d.color }}\">{{ d.status }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ========================= AI DECISION ENGINE ========================= -->\n      <sc-if value=\"{{ isAI }}\" hint-placeholder-val=\"{{ true }}\">\n      <section data-screen-label=\"AI Decision Engine\" style=\"padding:24px 28px 40px\">\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:1.6px;color:#5901E2;text-transform:uppercase;font-weight:700;margin-bottom:5px\">AI-native decision core<\u002Fdiv>\n          <h1 style=\"margin:0;font-size:25px;font-weight:800;letter-spacing:-.5px\">AI Decision Engine<\u002Fh1>\n          <p style=\"margin:5px 0 0;font-size:13.5px;color:#8A98A8\">Not rules with an AI plug-in — the AI <em style=\"color:#C3D0DD;font-style:normal;font-weight:600\">is<\u002Fem> the decision core. Four layers decide on the running floor in real time.<\u002Fp>\n        <\u002Fdiv>\n\n        <!-- Four AI layers -->\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px\">\n          <sc-for list=\"{{ aiLayers }}\" as=\"l\" hint-placeholder-count=\"4\">\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:14px;padding:16px 17px\">\n              <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:10px\">\n                <span style=\"width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;font-family:'IBM Plex Mono',monospace;background:{{ l.color }}22;color:{{ l.color }}\">{{ l.k }}<\u002Fspan>\n                <span style=\"width:7px;height:7px;border-radius:50%;background:#54E08A;animation:fa-pulse 1.6s infinite\"><\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:12px;color:#8A98A8;line-height:1.5\">{{ l.role }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:1.4fr 1fr;gap:16px\">\n          <!-- Action agent feed -->\n          <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:18px 20px\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:15px\">\n              <div style=\"font-size:14px;font-weight:700\">Action agents — live decision feed<\u002Fdiv>\n              <span style=\"display:flex;align-items:center;gap:7px;font-size:11.5px;color:#54E08A;font-weight:700\"><span style=\"width:7px;height:7px;border-radius:50%;background:#54E08A;animation:fa-pulse 1.4s infinite\"><\u002Fspan>{{ aiDecisions }} / min<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:10px\">\n              <sc-for list=\"{{ aiAgents }}\" as=\"a\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;gap:12px;padding:13px 14px;border-radius:11px;background:#0E141B;border:1px solid #1A2330\">\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:{{ a.color }};margin-top:4px;flex:none\"><\u002Fspan>\n                  <div style=\"flex:1;min-width:0\">\n                    <div style=\"font-size:12.5px;font-weight:500;line-height:1.4\">{{ a.action }}<\u002Fdiv>\n                    <div style=\"display:flex;align-items:center;gap:9px;margin-top:6px\">\n                      <span style=\"font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:{{ a.color }}1f;color:{{ a.color }}\">{{ a.tag }}<\u002Fspan>\n                      <span style=\"font-size:10.5px;color:#8A98A8\">confidence {{ a.conf }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <span style=\"font-size:10px;color:#5E6E80;font-family:'IBM Plex Mono',monospace;flex:none\">{{ a.time }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Right: scoring + optimisers -->\n          <div style=\"display:flex;flex-direction:column;gap:16px\">\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:18px 20px\">\n              <div style=\"font-size:14px;font-weight:700;margin-bottom:5px\">Dynamic task scoring<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#8A98A8;margin-bottom:14px\">Rule baseline vs AI rerank — learned from outcomes<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:12px\">\n                <sc-for list=\"{{ aiScoring }}\" as=\"s\" hint-placeholder-count=\"4\">\n                  <div>\n                    <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px\">\n                      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600\">{{ s.task }}<\u002Fspan>\n                      <div style=\"display:flex;align-items:center;gap:8px;font-family:'IBM Plex Mono',monospace;font-size:11.5px\"><span style=\"color:#5E6E80;text-decoration:line-through\">{{ s.base }}<\u002Fspan><span style=\"color:#5E6E80\">→<\u002Fspan><span style=\"color:#54E08A;font-weight:700\">{{ s.ai }}<\u002Fspan><\u002Fdiv>\n                    <\u002Fdiv>\n                    <div style=\"font-size:10.5px;color:#8A98A8\">{{ s.reason }}<\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:18px 20px\">\n              <div style=\"font-size:14px;font-weight:700;margin-bottom:14px\">Auto-optimisation<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:12px\">\n                <sc-for list=\"{{ aiOpt }}\" as=\"o\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;align-items:center;gap:12px\">\n                    <button onclick=\"{{ o.onClick }}\" style=\"{{ o.toggleStyle }}\">\n                      <span style=\"{{ o.knobStyle }}\"><\u002Fspan>\n                    <\u002Fbutton>\n                    <div style=\"flex:1;min-width:0\">\n                      <div style=\"font-size:12.5px;font-weight:600\">{{ o.name }}<\u002Fdiv>\n                      <div style=\"font-size:10.5px;color:#8A98A8;margin-top:1px\">{{ o.desc }}<\u002Fdiv>\n                    <\u002Fdiv>\n                    <span style=\"font-size:10.5px;font-weight:700;color:{{ o.gainColor }};flex:none\">{{ o.gain }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n      <!-- ========================= SIMULATION ========================= -->\n      <sc-if value=\"{{ isSim }}\" hint-placeholder-val=\"{{ true }}\">\n      <section data-screen-label=\"Simulation WH-Twin\" style=\"padding:24px 28px 40px\">\n        <div style=\"margin-bottom:18px\">\n          <div style=\"font-size:11px;letter-spacing:1.6px;color:#9B8CFF;text-transform:uppercase;font-weight:700;margin-bottom:5px\">WH-Twin · Isomorphic simulation<\u002Fdiv>\n          <h1 style=\"margin:0;font-size:25px;font-weight:800;letter-spacing:-.5px\">Simulation = production<\u002Fh1>\n          <p style=\"margin:5px 0 0;font-size:13.5px;color:#8A98A8\">Like a flight simulator: the same WES+RCS engine runs in sim and on the floor. The Agent is the only thing that switches.<\u002Fp>\n        <\u002Fdiv>\n\n        <!-- LIVE ROBOT SIMULATION -->\n        <div style=\"background:linear-gradient(160deg,#16142A,#111922);border:1px solid #2A2550;border-radius:16px;padding:18px 20px;margin-bottom:16px\">\n          <div style=\"display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:14px\">\n            <div>\n              <div style=\"display:flex;align-items:center;gap:9px\"><span style=\"width:8px;height:8px;border-radius:50%;background:#54E08A;animation:fa-pulse 1.5s infinite\"><\u002Fspan><div style=\"font-size:15px;font-weight:700\">Robot simulation — live run<\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#8A98A8;margin-top:4px;font-family:'IBM Plex Mono',monospace\">{{ simRunParams }}<\u002Fdiv>\n            <\u002Fdiv>\n            <button onclick=\"{{ launchSim }}\" style=\"display:flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;background:#9B8CFF;border:none;color:#0B0F14;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M8 5v14l11-7z\"><\u002Fpath><\u002Fsvg>Full screen<\u002Fbutton>\n          <\u002Fdiv>\n\n          <!-- metric cards -->\n          <div style=\"display:grid;grid-template-columns:repeat(6,1fr);gap:11px;margin-bottom:16px\">\n            <sc-for list=\"{{ simRunMetrics }}\" as=\"m\" hint-placeholder-count=\"6\">\n              <div style=\"background:#0E141B;border:1px solid #1A2330;border-radius:11px;padding:13px 14px\">\n                <div style=\"font-size:10.5px;color:#8A98A8;font-weight:600;margin-bottom:8px;line-height:1.3\">{{ m.label }}<\u002Fdiv>\n                <div style=\"display:flex;align-items:baseline;gap:4px\"><span style=\"font-size:21px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:{{ m.color }}\">{{ m.value }}<\u002Fspan><span style=\"font-size:10px;color:#5E6E80;font-weight:600\">{{ m.unit }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:9.5px;color:#5E6E80;margin-top:6px\">{{ m.note }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- embedded animation + cycle breakdown -->\n          <div style=\"display:grid;grid-template-columns:1fr 300px;gap:16px\">\n            <div style=\"border-radius:12px;overflow:hidden;border:1px solid #233040;background:#fff;height:430px\">\n              <iframe src=\"sim/warehouse_sim_800bph_50r.html\" title=\"Warehouse robot simulation\" style=\"width:100%;height:100%;border:0;display:block\"><\u002Fiframe>\n            <\u002Fdiv>\n            <div style=\"background:#0E141B;border:1px solid #1A2330;border-radius:12px;padding:16px 17px\">\n              <div style=\"font-size:13px;font-weight:700;margin-bottom:4px\">Cycle-time breakdown<\u002Fdiv>\n              <div style=\"font-size:11px;color:#8A98A8;margin-bottom:16px\">Avg cycle 152s · p90 205.9s<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:13px\">\n                <sc-for list=\"{{ simStageTimes }}\" as=\"s\" hint-placeholder-count=\"5 n:absolute;left:54px;top:54px;width:48px;height:14px;border:1.5px dashed #3DA8FF88;border-radius:2px\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"flex:1;min-width:0\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:5px\">\n              <div style=\"font-size:14px;font-weight:700\">Warehouse CAD model<\u002Fdiv>\n              <span style=\"font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:rgba(84,224,138,.13);color:#54E08A\">v3 · synced<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"font-size:12px;color:#8A98A8;font-family:'IBM Plex Mono',monospace;margin-bottom:4px\">DXB-DC-01_layout_rev3.dwg · 42,000 m² · imported 12 Jun 2026<\u002Fdiv>\n            <div style=\"font-size:11.5px;color:#8A98A8;line-height:1.5\">Drives the 3D twin, AMR traffic graph and slotting model. Upload a revised DWG / IFC / glTF to re-baseline the simulation.<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:8px;flex:none\">\n            <button onclick=\"{{ uploadCad }}\" style=\"display:flex;align-items:center;gap:8px;padding:9px 15px;border-radius:9px;background:#9B8CFF;border:none;color:#0B0F14;font-size:12.5px;font-weight:700;font-family:inherit;cursor:pointer\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M17 8l-5-5-5 5\"><\u002Fpath><path d=\"M12 3v12\"><\u002Fpath><\u002Fsvg>Upload new CAD<\u002Fbutton>\n            <button onclick=\"{{ versionHistory }}\" style=\"display:flex;align-items:center;justify-content:center;gap:8px;padding:9px 15px;border-radius:9px;background:#111922;border:1px solid #2A2550;color:#C3D0DD;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8\"><\u002Fpath><path d=\"M3 3v5h5\"><\u002Fpath><\u002Fsvg>Version history<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- One-engine diagram -->\n        <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:20px;margin-bottom:16px\">\n          <div style=\"display:flex;align-items:stretch;gap:0;justify-content:center\">\n            <div style=\"flex:1;max-width:230px;text-align:center;padding:16px;border-radius:12px;background:rgba(155,140,255,.08);border:1px solid rgba(155,140,255,.25)\">\n              <div style=\"font-size:11px;letter-spacing:1px;color:#9B8CFF;font-weight:700;text-transform:uppercase\">Simulation<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#C3D0DD;margin-top:8px\">Agent → <span style=\"color:#9B8CFF;font-weight:600\">virtual device<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:11px;color:#8A98A8;margin-top:6px\">1,000s of runs in parallel<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 22px;min-width:200px\">\n              <div style=\"font-size:13px;font-weight:700;color:#fff;text-align:center;padding:14px 18px;border-radius:12px;background:#0E141B;border:1px solid #2C3A4B;width:100%\">WES + WCS + RCS<div style=\"font-size:10.5px;color:#54E08A;font-weight:600;margin-top:3px\">single unified engine<\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:10px;color:#5E6E80;margin-top:10px;text-align:center\">Contract BOM = Sim BOM = Live BOM<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"flex:1;max-width:230px;text-align:center;padding:16px;border-radius:12px;background:rgba(84,224,138,.08);border:1px solid rgba(84,224,138,.25)\">\n              <div style=\"font-size:11px;letter-spacing:1px;color:#54E08A;font-weight:700;text-transform:uppercase\">Production<\u002Fdiv>\n              <div style=\"font-size:12.5px;color:#C3D0DD;margin-top:8px\">Agent → <span style=\"color:#54E08A;font-weight:600\">physical equipment<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:11px;color:#8A98A8;margin-top:6px\">\"Sim passed\" = go-live works<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <!-- lifecycle -->\n          <div style=\"display:flex;align-items:center;gap:8px;margin-top:20px;padding-top:18px;border-top:1px solid #1A2330\">\n            <sc-for list=\"{{ simStages }}\" as=\"st\" hint-placeholder-count=\"5\">\n              <div style=\"flex:1;display:flex;align-items:center;gap:8px\">\n                <div style=\"flex:1;text-align:center;padding:10px;border-radius:10px;background:#0E141B;border:1px solid #1A2330\">\n                  <div style=\"font-size:12.5px;font-weight:700;color:{{ st.color }}\">{{ st.n }} · {{ st.k }}<\u002Fdiv>\n                  <div style=\"font-size:10.5px;color:#8A98A8;margin-top:2px\">{{ st.d }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Device-in-the-loop -->\n        <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:18px 20px;margin-bottom:16px\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n            <div>\n              <div style=\"font-size:14px;font-weight:700\">Virtual commissioning — device-in-the-loop<\u002Fdiv>\n              <div style=\"font-size:11.5px;color:#8A98A8;margin-top:2px\">Every device type runs against its Agent in simulation before a single unit ships to the floor.<\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:11px;color:#9B8CFF;font-weight:700;font-family:'IBM Plex Mono',monospace\">PLC / device-in-the-loop<\u002Fspan>\n                <\u002Fdiv>\n                  <span style=\"font-size:9px;padding:2px 10px;border-radius:20px;background:{{ sr.tagBg }};color:{{ sr.tagColor }};font-weight:700;border:1px solid {{ sr.tagBorder }};white-space:nowrap;flex:none\">{{ sr.tag }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#0D141C;border-radius:9px;margin-bottom:10px;border:1px solid #1C2530\">\n                  <span style=\"font-size:10px;color:#5E6E80\">{{ sr.controlLabel }}<\u002Fspan>\n                  <span style=\"font-size:11px;font-weight:700;color:{{ sr.tagColor }};font-family:'IBM Plex Mono',monospace\">{{ sr.current }}<\u002Fspan>\n                <\u002Fdiv>\n                <select style=\"width:100%;background:#111922;border:1px solid #1C2530;border-radius:8px;padding:7px 12px;font-size:11px;color:#8A98A8;cursor:pointer\">\n                  <sc-for list=\"{{ sr.options }}\" as=\"so\" hint-placeholder-count=\"3\">\n                    <option>{{ so }}<\u002Foption>\n                  <\u002Fsc-for>\n                <\u002Fselect>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- CPQ & BIDDING -->\n        <sc-if value=\"{{ wsIsCpq }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:1fr 340px;gap:14px;height:calc(100vh - 230px)\">\n          <div style=\"display:flex;flex-direction:column;gap:12px;overflow-y:auto\">\n            <div style=\"display:flex;align-items:center;gap:10px\">\n              <div style=\"font-size:13px;font-weight:700;flex:1\">Bill of Materials — v2.1<\u002Fdiv>\n              <button style=\"padding:5px 12px;border-radius:8px;background:transparent;border:1px solid #1C2530;color:#8A98A8;font-size:11px;cursor:pointer\">v1.0<\u002Fbutton>\n              <button style=\"padding:5px 12px;border-radius:8px;background:transparent;border:1px solid #1C2530;color:#8A98A8;font-size:11px;cursor:pointer\">v2.0<\u002Fbutton>\n              <button style=\"padding:5px 12px;border-radius:8px;background:rgba(155,140,255,.1);border:1px solid rgba(155,140,255,.3);color:#9B8CFF;font-size:11px;cursor:pointer;font-weight:600\">v2.1 ✓<\u002Fbutton>\n            <\u002Fdiv>\n            <sc-for list=\"{{ cpqCategories }}\" as=\"cc\" hint-placeholder-count=\"4\">\n              <div style=\"background:#111922;border:1px solid {{ cc.borderColor }};border-radius:14px;overflow:hidden\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #1C2530\">\n                  <div style=\"display:flex;align-items:center;gap:10px\">\n                    <div style=\"width:3px;height:20px;border-radius:2px;background:{{ cc.color }}\"><\u002Fdiv>\n                    <div style=\"font-size:13px;font-weight:700\">{{ cc.name }}<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:14px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:{{ cc.color }}\">{{ cc.total }}<\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"padding:12px 16px;display:flex;flex-direction:column;gap:7px\">\n                  <sc-for list=\"{{ cc.items }}\" as=\"ci\" hint-placeholder-count=\"3\">\n                    <div style=\"display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;font-size:12px\">\n                      <span style=\"color:#C3D0DD\">{{ ci.name }}<\u002Fspan>\n                      <span style=\"color:#8A98A8;font-size:10px\">×{{ ci.qty }}<\u002Fspan>\n                      <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;color:{{ cc.color }}\">{{ ci.price }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px;overflow-y:auto\">\n            <div style=\"background:#111922;border:1px solid rgba(155,140,255,.2);border-radius:14px;padding:16px\">\n              <div style=\"font-size:13px;font-weight:700;margin-bottom:14px\">RFP Summary<\u002Fdiv>\n              <div style=\"display:flex;flex-direction:column;gap:8px\">\n                <sc-for list=\"{{ cpqRfpItems }}\" as=\"ri\" hint-placeholder-count=\"4\">\n                  <div style=\"display:flex;justify-content:space-between;align-items:center;font-size:12px\">\n                    <span style=\"color:#8A98A8\">{{ ri.label }}<\u002Fspan>\n                    <span style=\"font-weight:600;color:#EAF0F6\">{{ ri.value }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:14px;padding:16px;flex:1\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:12px\">\n                <div style=\"font-size:12px;font-weight:700\">Proposal Outline<\u002Fdiv>\n                <button style=\"padding:4px 12px;border-radius:8px;background:linear-gradient(135deg,#510cd9,#7a3ae0);color:#fff;font-size:10px;font-weight:600;border:none;cursor:pointer\">Generate<\u002Fbutton>\n              <\u002Fdiv>\n              <sc-for list=\"{{ cpqOutline }}\" as=\"ol\" hint-placeholder-count=\"4\">\n                <div style=\"border-left:2px solid {{ ol.color }};padding:6px 10px;margin-bottom:6px;border-radius:0 6px 6px 0;background:rgba(255,255,255,.02)\">\n                  <div style=\"font-size:11px;font-weight:600;color:#EAF0F6\">{{ ol.chapter }}<\u002Fdiv>\n                  <div style=\"font-size:10px;color:#5E6E80;margin-top:2px\">{{ ol.sections }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ROBO ADVISOR WORKFLOW -->\n        <sc-if value=\"{{ wsIsRoboWorkflow }}\" hint-placeholder-val=\"false\">\n        <div style=\"display:flex;flex-direction:column;gap:16px;height:calc(100vh - 230px);overflow-y:auto\">\n          <div style=\"background:linear-gradient(160deg,#15142A,#111922);border:1px solid rgba(155,140,255,.25);border-radius:16px;padding:20px\">\n            <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:20px\">\n              <div>\n                <div style=\"font-size:11px;letter-spacing:1.3px;color:#9B8CFF;text-transform:uppercase;font-weight:700;margin-bottom:6px\">Workshop deliverable · Robo Advisor<\u002Fdiv>\n                <h2 style=\"margin:0;font-size:20px;font-weight:800;letter-spacing:-.3px\">Outcome of the Workshop process<\u002Fh2>\n                <p style=\"margin:7px 0 0;font-size:13px;color:#8A98A8;line-height:1.6;max-width:820px\">Robo Advisor is presented here as the generated deliverable produced after the Scene Editor, Trigger Editor, Data Editor, WES Strategy and CPQ inputs are validated. It packages requirements, AI layout recommendations, SKU classification, equipment sizing, simulation assumptions and quote-ready outputs into one reviewable workflow.<\u002Fp>\n              <\u002Fdiv>\n              <span style=\"font-size:10.5px;font-weight:700;color:#54E08A;background:rgba(84,224,138,.12);border:1px solid rgba(84,224,138,.25);padding:5px 10px;border-radius:999px;white-space:nowrap\">Deliverable generated<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:0;background:#111922;border:1px solid #1C2530;border-radius:14px;padding:16px 20px\">\n            <sc-for list=\"{{ advSteps }}\" as=\"st\" hint-placeholder-count=\"5\">\n              <div style=\"flex:1;display:flex;align-items:center;gap:12px\">\n                <div style=\"display:flex;align-items:center;gap:10px\">\n                  <span style=\"{{ st.circleStyle }}\">{{ st.n }}<\u002Fspan>\n                  <span style=\"color:{{ st.labelColor }};font-size:12.5px;font-weight:600;white-space:nowrap\">{{ st.k }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"flex:1;height:1.5px;background:#1F2A36;min-width:14px\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px\">\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:14px;padding:17px\">\n              <div style=\"font-size:12px;font-weight:800;color:#9B8CFF;margin-bottom:8px\">1 · Inputs captured<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:700;margin-bottom:7px\">Requirements, site model and operational rules<\u002Fdiv>\n              <div style=\"font-size:11px;color:#8A98A8;line-height:1.6\">Workshop users define area, SKU mix, throughput target, exception rules, connector mappings and WES strategy. These become the design constraints used by the deliverable.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:14px;padding:17px\">\n              <div style=\"font-size:12px;font-weight:800;color:#54E08A;margin-bottom:8px\">2 · AI synthesis<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:700;margin-bottom:7px\">Layout, slotting and equipment recommendations<\u002Fdiv>\n              <div style=\"font-size:11px;color:#8A98A8;line-height:1.6\">The workflow generates a candidate warehouse layout, classifies SKU velocity, sizes AMR, GTP, sortation and ASRS components, then validates key assumptions in simulation.<\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:14px;padding:17px\">\n              <div style=\"font-size:12px;font-weight:800;color:#F5B53D;margin-bottom:8px\">3 · Output packaged<\u002Fdiv>\n              <div style=\"font-size:13px;font-weight:700;margin-bottom:7px\">Screen designs, BOM and quote handoff<\u002Fdiv>\n              <div style=\"font-size:11px;color:#8A98A8;line-height:1.6\">The final deliverable is handed into CPQ &amp; Bidding as a quote-ready BOM with design screens, assumptions and approval-ready customer narrative.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:16px\">\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:18px 20px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n                <div style=\"font-size:14px;font-weight:700\">Workflow handoff map<\u002Fdiv>\n                <span style=\"font-size:11px;color:#8A98A8\">Workshop narrative flow<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:8px;align-items:stretch\">\n                <div style=\"background:#0E141B;border:1px solid rgba(155,140,255,.25);border-radius:12px;padding:12px;text-align:center\"><div style=\"font-size:10px;color:#9B8CFF;font-weight:800;margin-bottom:5px\">SCENE<\u002Fdiv><div style=\"font-size:11px;color:#C3D0DD;line-height:1.4\">Layout geometry and device palette<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#0E141B;border:1px solid rgba(61,168,255,.25);border-radius:12px;padding:12px;text-align:center\"><div style=\"font-size:10px;color:#3DA8FF;font-weight:800;margin-bottom:5px\">TRIGGER<\u002Fdiv><div style=\"font-size:11px;color:#C3D0DD;line-height:1.4\">Operational flow and decision nodes<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#0E141B;border:1px solid rgba(245,181,61,.25);border-radius:12px;padding:12px;text-align:center\"><div style=\"font-size:10px;color:#F5B53D;font-weight:800;margin-bottom:5px\">DATA<\u002Fdiv><div style=\"font-size:11px;color:#C3D0DD;line-height:1.4\">SKU, order and connector assumptions<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#0E141B;border:1px solid rgba(84,224,138,.25);border-radius:12px;padding:12px;text-align:center\"><div style=\"font-size:10px;color:#54E08A;font-weight:800;margin-bottom:5px\">WES<\u002Fdiv><div style=\"font-size:11px;color:#C3D0DD;line-height:1.4\">Strategy rules and SLA logic<\u002Fdiv><\u002Fdiv>\n                <div style=\"background:#171026;border:1px solid rgba(155,140,255,.35);border-radius:12px;padding:12px;text-align:center\"><div style=\"font-size:10px;color:#9B8CFF;font-weight:800;margin-bottom:5px\">ROBO ADVISOR<\u002Fdiv><div style=\"font-size:11px;color:#EAF0F6;line-height:1.4\">Generated screens, sizing and BOM<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"background:#0A0F14;border:1px solid #1C2530;border-radius:16px;padding:18px 20px;overflow:hidden\">\n              <div style=\"font-size:14px;font-weight:700;margin-bottom:12px\">Functional logic<\u002Fdiv>\n              <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;line-height:1.8;color:#C3D0DD\">\n                <div style=\"color:#9B8CFF\">› requirements.locked = true<\u002Fdiv>\n                <div style=\"color:#3DA8FF\">› layout_ai.generate(scene, flows, sku)<\u002Fdiv>\n                <div style=\"color:#54E08A\">✓ capacity target met: 1,420 units/hr<\u002Fdiv>\n                <div style=\"color:#54E08A\">✓ SKU classes written to slotting model<\u002Fdiv>\n                <div style=\"color:#F5B53D\">› cpq.create_quote(bom_preview)<\u002Fdiv>\n                <div style=\"color:#8A98A8\">› customer_review.package = ready<span style=\"animation:fa-blink 1s infinite\">_<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- ROBO ADVISOR SCREEN / LAYOUT DESIGNS -->\n        <sc-if value=\"{{ wsIsRoboScreens }}\" hint-placeholder-val=\"false\">\n        <div style=\"display:flex;flex-direction:column;gap:16px;height:calc(100vh - 230px);overflow-y:auto\">\n          <div style=\"display:grid;grid-template-columns:1.2fr 1fr;gap:16px\">\n            <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:18px 20px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:14px\">\n                <div><div style=\"font-size:14px;font-weight:700\">Robo Advisor screen design · AI-generated layout<\u002Fdiv><div style=\"font-size:11.5px;color:#8A98A8;margin-top:2px\">Screen/layout design retained inside the Workshop deliverable narrative.<\u002Fdiv><\u002Fdiv>\n                <span style=\"font-size:10.5px;font-weight:700;color:#54E08A;background:rgba(84,224,138,.12);padding:3px 9px;border-radius:6px\">Auto-generated<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:relative;height:250px;border-radius:11px;background:#0A0F14;border:1px solid #1A2330;background-image:linear-gradient(#101a24 1px,transparent 1px),linear-gradient(90deg,#101a24 1px,transparent 1px);background-size:24px 24px;overflow:hidden;padding:14px\">\n                <div style=\"position:absolute;left:6%;top:14%;width:10%;height:72%;border-radius:3px;background:#1C2A39;border:1px solid #54E08A55\"><\u002Fdiv>\n                <div style=\"position:absolute;left:20%;top:14%;width:10%;height:72%;border-radius:3px;background:#1C2A39;border:1px solid #54E08A55\"><\u002Fdiv>\n                <div style=\"position:absolute;left:36%;top:14%;width:10%;height:30%;border-radius:3px;background:#1C2A39;border:1px solid #3DA8FF55\"><\u002Fdiv>\n                <div style=\"position:absolute;left:36%;top:54%;width:10%;height:32%;border-radius:3px;background:#1C2A39;border:1px solid #3DA8FF55\"><\u002Fdiv>\n                <div style=\"position:absolute;left:52%;top:14%;width:24%;height:36%;border-radius:5px;background:rgba(245,181,61,.08);border:1px dashed #F5B53D66;display:flex;align-items:center;justify-content:center;font-size:10px;color:#F5B53D\">GTP stations<\u002Fdiv>\n                <div style=\"position:absolute;left:52%;top:56%;width:24%;height:30%;border-radius:5px;background:rgba(155,140,255,.08);border:1px dashed #9B8CFF66;display:flex;align-items:center;justify-content:center;font-size:10px;color:#9B8CFF\">Pack-out<\u002Fdiv>\n                <div style=\"position:absolute;left:82%;top:14%;width:12%;height:72%;border-radius:5px;background:rgba(61,168,255,.08);border:1px dashed #3DA8FF66;display:flex;align-items:center;justify-content:center;font-size:10px;color:#3DA8FF;writing-mode:vertical-rl\">Dock<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:14px\">\n                <div style=\"text-align:center;padding:12px;border-radius:10px;background:#0E141B;border:1px solid #1A2330\"><div style=\"font-size:19px;font-weight:800;font-family:'IBM Plex Mono',monospace;color:#54E08A\">1,420<\u002Fdiv><div style=\"font-size:10.5px;color:#8A98A8;margin-top:2px\">units/hr target<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;padding:12px;border-radius:10px;background:#0E141B;border:1px solid #1A2330\"><div style=\"font-size:19px;font-weight:800;font-family:'IBM Plex Mono',monospace\">86%<\u002Fdiv><div style=\"font-size:10.5px;color:#8A98A8;margin-top:2px\">storage density<\u002Fdiv><\u002Fdiv>\n                <div style=\"text-align:center;padding:12px;border-radius:10px;background:#0E141B;border:1px solid #1A2330\"><div style=\"font-size:19px;font-weight:800;font-family:'IBM Plex Mono',monospace\">4,200<\u002Fdiv><div style=\"font-size:10.5px;color:#8A98A8;margin-top:2px\">m² footprint<\u002Fdiv><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div style=\"display:flex;flex-direction:column;gap:16px\">\n              <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;padding:18px 20px\">\n                <div style=\"font-size:14px;font-weight:700;margin-bottom:14px\">SKU velocity classification<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:11px\">\n                  <sc-for list=\"{{ skuClasses }}\" as=\"k\" hint-placeholder-count=\"4\">\n                    <div style=\"display:flex;align-items:center;gap:12px\">\n                      <span style=\"width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;background:{{ k.color }}22;color:{{ k.color }};flex:none\">{{ k.c }}<\u002Fspan>\n                      <div style=\"flex:1;min-width:0\">\n                        <div style=\"display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:5px\"><span style=\"color:#C3D0DD;font-weight:500\">{{ k.label }}<\u002Fspan><span style=\"color:#8A98A8\">{{ k.share }}<\u002Fspan><\u002Fdiv>\n                        <div style=\"height:6px;border-radius:3px;background:#0E141B;overflow:hidden\"><div style=\"height:100%;border-radius:3px;background:{{ k.color }};width:{{ k.pct }}%\"><\u002Fdiv><\u002Fdiv>\n                      <\u002Fdiv>\n                      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;color:{{ k.color }};width:34px;text-align:right\">{{ k.pct }}%<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"background:#111922;border:1px solid #1C2530;border-radius:16px;overflow:hidden\">\n                <div style=\"padding:16px 20px 12px;font-size:14px;font-weight:700\">Auto-derived BOM preview<\u002Fdiv>\n                <sc-for list=\"{{ bom }}\" as=\"b\" hint-placeholder-count=\"5\">\n                  <div style=\"display:flex;align-items:center;gap:12px;padding:11px 20px;border-top:1px solid #161F29\">\n                    <div style=\"flex:1;min-width:0\"><div style=\"font-size:12.5px;font-weight:500\">{{ b.item }}<\u002Fdiv><div style=\"font-size:10.5px;color:#8A98A8;font-family:'IBM Plex Mono',monospace;margin-top:1px\">{{ b.qty }} × {{ b.unit }}<\u002Fdiv><\u002Fdiv>\n                    <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;font-weight:600\">{{ b.total }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#0E141B;border-top:1px solid #1C2530\">\n                  <span style=\"font-size:12.5px;color:#8A98A8;font-weight:600\">Generated by Workshop · handed to CPQ<\u002Fspan>\n                  <span style=\"font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:800;color:#54E08A\">AED 1.62M<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsection>\n      <\u002Fsc-if>\n\n<!-- ========================= DIGITAL SANDBOX ========================= -->\n      <sc-if value=\"{{ isSandbox }}\" hint-placeholder-val=\"{{ true }}\">\n      <section data-screen-label=\"Digital Sandbox\" style=\"padding:24px 28px 40px;display:flex;flex-direction:column;height:calc(100vh - 64px)\">\n        <div style=\"display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:16px;flex-shrink:0\">\n          <div>\n            <div style=\"font-size:11px;letter-spacing:1.6px;color:#5901E2;text-transform:uppercase;font-weight:700;margin-bottom:5px\">Simulation · WH-Twin<\u002Fdiv>\n            <h1 style=\"margin:0;font-size:25px;font-weight:800;letter-spacing:-.5px\">Digital Sandbox<\u002Fh1>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10p :1px solid #233040;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#9B8CFF\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z\"><\u002Fpath><path d=\"M14 2v6h6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n                <div style=\"flex:1;min-width:0\"><div style=\"font-size:12.5px;font-weight:600;font-family:'IBM Plex Mono',monospace\">{{ r.name }}<\u002Fdiv><div style=\"font-size:10.5px;color:#8A98A8;margin-top:2px\">{{ r.meta }}<\u002Fdiv><\u002Fdiv>\n                <span style=\"font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;background:#1A1230;color:#9B8CFF;text-transform:uppercase\">{{ r.tag }}<\u002Fspan>\n                <button onclick=\"{{ r.onClick }}\" style=\"padding:7px 12px;border-radius:8px;background:transparent;border:1px solid #233040;color:#C3D0DD;font-size:11.5px;font-weight:600;font-family:inherit;cursor:pointer\">Set active<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- BESPOKE: PLC / Device I/O (configurable) -->\n        <sc-if value=\"{{ capDetail.isPlcIo }}\" hint-placeholder-val=\"\">\n        <div>\n          <label for=\"fa-plc-file\" style=\"display:flex;align-items:center;gap:14px;padding:18px 20px;border:1.5px dashed #3A2470;border-radius:14px;background:#140C24;cursor:pointer;margin-bottom:18px\">\n            <span style=\"width:44px;height:44px;border-radius:11px;background:#5901E2;display:flex;align-items:center;justify-content:center;flex:none\"><svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4\"><\u002Fpath><path d=\"M17 8l-5-5-5 5\"><\u002Fpath><path d=\"M12 3v12\"><\u00  solid #1C2530;background:#0E141B;font-size:10.5px;letter-spacing:.5px;text-transform:uppercase;color:#5E6E80;font-weight:700\">\n              <span>Controller<\u002Fspan><span>Protocol<\u002Fspan><span>I/O points<\u002Fspan><span>Scan<\u002Fspan><span style=\"text-align:center\">Enabled<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ plcControllers }}\" as=\"c\" hint-placeholder-count=\"4\">\n              <div style=\"display:grid;grid-template-columns:1.6fr 1.3fr .8fr .8fr .7fr;align-items:center;padding:12px 18px;border-bottom:1px solid #161F29\">\n                <div style=\"display:flex;align-items:center;gap:10px;min-width:0\"><span style=\"width:8px;height:8px;border-radius:50%;flex:none;background:{{ c.dot }}\"><\u002Fspan><span style=\"font-size:12.5px;font-weight:600\">{{ c.name }}<\u002Fspan><\u002Fdiv>\n                <select value=\"{{ c.proto }}\" onchange=\"{{ c.onProtoChange }}\" style=\"width:90%;padding:6px 9px;border-radius:8px;background:#0E141B;border:1px solid #233040;color:#C3D0DD;font-size:11.5px;font-family:inherit;cursor:pointer\">\n                  <option value=\"PROFINET\">PROFINET<\u002Foption>\n                  <option value=\"EtherNet/IP\">EtherNet/IP<\u002Foption>\n                  <option value=\"EtherCAT\">EtherCAT<\u002Foption>\n                  <option value=\"Modbus TCP\">Modbus TCP<\u002Foption>\n                  <option value=\"OPC-UA\">OPC-UA<\u002Foption>\n                <\u002Fselect>\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C3D0DD\">{{ c.io }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8A98A8\">{{ c.scan }}<\u002Fspan>\n                <div style=\"display:flex;justify-content:center\">\n                  <button onclick=\"{{ c.onToggle }}\" style=\"{{ c.togStyle }}\"><span style=\"{{ c.togKnob }}\"><\u002Fspan><\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"margin-top:13px;max-width:860px;font-size:12px;color:#8A98A8;line-height:1.6\">Every controller is normalised onto one event model regardless of vendor protocol. Switch a controller's protocol, disable it during maintenance, or upload its electrical diagram to auto-map I/O tags — no floor re-coding.<\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- BESPOKE: Routing & Divert Logic — robot path designer -->\n        <sc-if value=\"{{ capDetail.isRouting }}\" hint-placeholder-val=\"\">\n        <div>\n          <div style=\"display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px;flex-wrap:wrap\">\n            <div style=\"font-size:12.5px;color:#8A98A8;line-height:1.6;max-width:640px\">Click any robot on the floor to open its route designer, then chain waypoints — inbound, rack locations, GTP stations and outbound — in travel order. Once saved, the robot follows the path live across the layout.<\u002Fdiv>\n            <div style=\"display:flex;gap:13px;align-items:center;flex-wrap:wrap\">\n              <sc-for list=\"{{ routeLegend }}\" as=\"l\" hint-placeholder-count=\"4\">\n                <span style=\"display:flex;align-items:center;gap:6px;font-size:11px;color:#8A98A8\"><span style=\"width:10px;height:10px;border-radius:3px;background:{{ l.color }}\"><\u002Fspan>{{ l.label }}<\u002Fspan>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px\">\n            <span style=\"font-size:11px;color:#5E6E80;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-right:2px\">View robots<\u002Fspan>\n            <sc-for list=\"{{ routeRobotToggles }}\" as=\"t\" hint-placeholder-count=\"3\">\n              <div style=\"{{ t.wrapStyle }}\">\n                <span style=\"{{ t.dotStyle }}\"><\u002Fspan>\n
